<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 - 设备借用系统</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: #fff; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .login-box h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; text-align: center; }
  .login-box p { font-size: 13px; color: #888; margin-bottom: 30px; text-align: center; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #0052d9; }
  .btn { width: 100%; padding: 12px; background: #0052d9; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
  .btn:hover { background: #003bb3; }
  .error { background: #fff0e6; color: #a0522d; border: 1px solid #ffd4b3; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
  .logo { font-size: 40px; text-align: center; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🖥️</div>
  <h1>设备借用管理后台</h1>
  <p>请输入管理员账号密码</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/admin/login/submit">
    <div class="form-group">
      <label>账号</label>
      <input type="text" name="username" placeholder="请输入账号" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn">登 录</button>
  </form>
</div>
</body>
</html>
