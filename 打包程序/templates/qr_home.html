<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备借用系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .logo { font-size: 64px; margin-bottom: 20px; }
  h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; text-align: center; }
  p { font-size: 14px; color: #888; margin-bottom: 40px; text-align: center; }
  .btn-row { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 320px; }
  .btn { display: block; width: 100%; padding: 20px; border-radius: 14px; font-size: 17px; font-weight: 600; text-align: center; text-decoration: none; cursor: pointer; border: none; }
  .btn-borrow { background: #0052d9; color: #fff; }
  .btn-return { background: #34a853; color: #fff; }
  .btn:hover { opacity: 0.9; }
  .footer { margin-top: 40px; font-size: 12px; color: #aaa; text-align: center; }
</style>
</head>
<body>
<div class="logo">🖥️</div>
<h1>设备借用管理系统</h1>
<p>请选择操作</p>
<div class="btn-row">
  <a href="/borrow" class="btn btn-borrow">📋 借用登记</a>
  <a href="/return" class="btn btn-return">🔄 归还登记</a>
</div>
<div class="footer">如有问题请联系管理员</div>
</body>
</html>
