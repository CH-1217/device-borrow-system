<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备借用归还管理系统</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #fff;
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header h1 {
    color: #1a1a1a;
    font-size: 20px;
    font-weight: 600;
  }
  .header .admin-link {
    color: #666;
    text-decoration: none;
    padding: 8px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    transition: all 0.3s;
    font-size: 14px;
  }
  .header .admin-link:hover {
    background: #f0f0f0;
    border-color: #ccc;
  }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }
  .hero {
    text-align: center;
    margin-bottom: 50px;
  }
  .hero .logo {
    font-size: 72px;
    margin-bottom: 20px;
  }
  .hero h2 {
    font-size: 32px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 12px;
  }
  .hero p {
    font-size: 16px;
    color: #666;
    max-width: 500px;
    line-height: 1.6;
  }
  .actions {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .action-card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    color: #333;
    min-width: 180px;
  }
  .action-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  .action-card .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .action-card h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1a1a1a;
  }
  .action-card p {
    font-size: 13px;
    color: #888;
  }
  .action-card.borrow { border-top: 3px solid #2563eb; }
  .action-card.return { border-top: 3px solid #16a34a; }
  .action-card.qr { border-top: 3px solid #ea580c; }
  .footer {
    text-align: center;
    padding: 20px;
    color: #999;
    font-size: 13px;
  }
  @media (max-width: 768px) {
    .header { padding: 16px 20px; }
    .header h1 { font-size: 16px; }
    .hero h2 { font-size: 24px; }
    .action-card { padding: 24px 30px; min-width: 150px; }
  }
</style>
</head>
<body>
  <header class="header">
    <h1>📦 设备借用归还管理系统</h1>
    <a href="/admin/login" class="admin-link">🔐 管理后台</a>
  </header>

  <main class="main">
    <div class="hero">
      <div class="logo">🖥️</div>
      <h2>高效管理设备借用</h2>
      <p>简化设备借用流程，实时追踪设备状态，让资产管理更轻松</p>
    </div>

    <div class="actions">
      <a href="/borrow" class="action-card borrow">
        <div class="icon">📋</div>
        <h3>借用登记</h3>
        <p>登记设备借用信息</p>
      </a>
      <a href="/return" class="action-card return">
        <div class="icon">🔄</div>
        <h3>归还登记</h3>
        <p>登记设备归还信息</p>
      </a>
      <a href="/qr" class="action-card qr">
        <div class="icon">📱</div>
        <h3>扫码入口</h3>
        <p>扫描二维码快速访问</p>
      </a>
    </div>
  </main>

  <footer class="footer">
    <p>设备借用归还管理系统 V1.0</p>
  </footer>
</body>
</html>
